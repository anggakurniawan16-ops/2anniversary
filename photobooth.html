<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Photobooth | Angga & Tsania</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600&family=Playfair+Display:ital,wght=0,400;1,400&display=swap" rel="stylesheet">

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f5f0e6, #ecd5e9);
            min-height: 100vh;
            padding: 40px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a3e3e;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 2.5rem;
            color: #8b5a6c;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a6828e;
            margin-bottom: 30px;
        }

        .workspace {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
        }

        /* ========================================================
           KOTAK KAMERA (LIVE VIEW)
           ======================================================== */
        .camera-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(139, 90, 108, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 440px;
            height: fit-content;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #333;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .timer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 10;
        }

        .capture-status {
            margin: 15px 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: #b76e79;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            gap: 5px;
        }

        /* ========================================================
           STRIP FOTO HASIL JEPRETAN
           ======================================================== */
        .photostrip-container {
            width: 100%;
            max-width: 360px; 
        }

        .photostrip { 
            background-color: #ffffff;
            width: 100%;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(139, 90, 108, 0.15);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
        }

        .pb-frame { 
            width: 100%; 
            aspect-ratio: 4 / 3; 
            background-color: #f7f5f0;
            margin-bottom: 15px; 
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ccc;
            font-size: 0.8rem;
        }
        
        .pb-frame canvas { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: cover !important; 
        }

        .pb-footer { 
            text-align: center;
            margin-top: 10px;
            border-top: 1px dashed #e8e2d5;
            padding-top: 15px;
        }

        .pb-footer .names {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #5c4d4d;
            margin-bottom: 4px;
        }

        .pb-footer .date {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #a6828e;
        }

        /* ========================================================
           BUTTONS
           ======================================================== */
        .btn { 
            padding: 12px 28px; 
            background-color: transparent; 
            color: #8b5a6c; 
            border: 1px solid #8b5a6c; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn:hover { 
            background-color: #8b5a6c; 
            color: white;
        }

        .btn-capture {
            background-color: #b76e79;
            color: white;
            border: none;
            width: 100%;
            max-width: 200px;
        }
        .btn-capture:hover {
            background-color: #9e5963;
        }

        .btn-undo {
            background-color: #f0e2e6;
            color: #8b5a6c;
            border: 1px dashed #8b5a6c;
        }
        .btn-undo:hover {
            background-color: #e2cbd2;
        }

        .btn-download {
            background-color: #5c4d4d;
            color: white;
            border: none;
            width: 100%;
            margin-top: 15px;
        }
        .btn-download:hover {
            background-color: #423636;
        }

        .navigation-box {
            margin-top: 40px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <audio id="lagu-romantis" loop><source src="musik.mp3" type="audio/mpeg"></audio>

    <h2>our photobooth.</h2>
    <p class="subtitle">capture your happy moments</p>

    <div class="workspace">
        <div class="camera-box">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div id="timerOverlay" class="timer-overlay">3</div>
            </div>
            <div class="capture-status" id="statusText">Siap berpose? (Butuh 3 Foto)</div>
            
            <div class="action-buttons">
                <button class="btn btn-capture" id="captureBtn" onclick="mulaiCountdown()">AMBIL FOTO</button>
                <button class="btn btn-undo" id="undoBtn" onclick="undoFotoLast()" style="display: none;">↩ Ulang Foto</button>
                <button class="btn" id="resetBtn" style="font-size: 0.75rem; border: none;" onclick="resetFoto()">Reset Semua</button>
            </div>
        </div>

        <div class="photostrip-container">
            <div class="photostrip" id="cetakanFoto">
                <div class="pb-frame" id="frame-1">Slot Foto 1</div>
                <div class="pb-frame" id="frame-2">Slot Foto 2</div>
                <div class="pb-frame" id="frame-3">Slot Foto 3</div>
                
                <div class="pb-footer">
                    <p class="names">Angga & Tsania</p>
                    <p class="date">19 . 07 . 2024</p>
                </div>
            </div>
            
            <button class="btn btn-download" onclick="simpanKeGaleri()">💾 Download Hasil Foto</button>
        </div>
    </div>

    <div class="navigation-box">
        <button class="btn" onclick="kembali()">⬅ back to gallery</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('statusText');
        const timerOverlay = document.getElementById('timerOverlay');
        const captureBtn = document.getElementById('captureBtn');
        const undoBtn = document.getElementById('undoBtn');
        let fotoCount = 0;
        let isCountingDown = false;
        let sisaFoto = []; 

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 } } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Gagal mengakses kamera: ", err);
                statusText.innerText = "Gagal memuat kamera. Izinkan akses webcam browser ya!";
            });

        function mulaiCountdown() {
            if (fotoCount >= 3) {
                statusText.innerText = "Strip sudah penuh! Hapus foto terakhir atau reset untuk mengulang.";
                return;
            }
            if (isCountingDown) return;

            isCountingDown = true;
            captureBtn.disabled = true;
            captureBtn.style.opacity = '0.5';
            undoBtn.disabled = true;
            
            let timeLeft = 3;
            timerOverlay.innerText = timeLeft;
            timerOverlay.style.opacity = '1';
            statusText.innerText = `Bersiap dalam... ${timeLeft}`;

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerOverlay.innerText = timeLeft;
                    statusText.innerText = `Bersiap dalam... ${timeLeft}`;
                } else {
                    clearInterval(interval);
                    timerOverlay.style.opacity = '0';
                    isCountingDown = false;
                    ambilFoto();
                }
            }, 1000);
        }

        function ambilFoto() {
            fotoCount++;
            const currentFrame = document.getElementById(`frame-${fotoCount}`);
            currentFrame.innerHTML = ''; 

            const activeWidth = video.videoWidth || 640;
            const activeHeight = video.videoHeight || 480;

            const canvas = document.createElement('canvas');
            canvas.width = activeWidth;
            canvas.height = activeHeight;
            const ctx = canvas.getContext('2d');

            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const displayCanvas = document.createElement('canvas');
            displayCanvas.width = activeWidth;
            displayCanvas.height = activeHeight;
            const dCtx = displayCanvas.getContext('2d');
            dCtx.drawImage(canvas, 0, 0);
            currentFrame.appendChild(displayCanvas);

            sisaFoto.push(canvas);

            // Tampilkan tombol undo karena minimal ada 1 foto yang bisa dibatalkan
            undoBtn.style.display = 'inline-block';
            undoBtn.disabled = false;

            if (fotoCount < 3) {
                statusText.innerText = `Foto ke-${fotoCount} berhasil disimpan!`;
                captureBtn.disabled = false;
                captureBtn.style.opacity = '1';
            } else {
                statusText.innerText = "Yaaay! Strip foto kamu sudah jadi. Yuk download!";
                captureBtn.style.opacity = '0.5';
                captureBtn.disabled = true;
            }
        }

        // ========================================================
        // FITUR BARU: CANCEL / UNDO FOTO TERAKHIR SAJA
        // ========================================================
        function undoFotoLast() {
            if (isCountingDown || fotoCount === 0) return;

            // Kembalikan teks penampung slot foto yang dihapus
            const currentFrame = document.getElementById(`frame-${fotoCount}`);
            currentFrame.innerHTML = `Slot Foto ${fotoCount}`;

            // Hapus data foto terakhir dari array penyimpanan memori
            sisaFoto.pop();
            fotoCount--;

            // Sembunyikan kembali tombol undo jika semua foto sudah dibatalkan
            if (fotoCount === 0) {
                undoBtn.style.display = 'none';
                statusText.innerText = "Siap berpose? (Butuh 3 Foto)";
            } else {
                statusText.innerText = `Foto terakhir dihapus. Silakan ambil ulang foto ke-${fotoCount + 1}!`;
            }

            // Aktifkan kembali tombol capture utama
            captureBtn.disabled = false;
            captureBtn.style.opacity = '1';
        }

        function resetFoto() {
            if (isCountingDown) return;
            fotoCount = 0;
            sisaFoto = [];
            document.getElementById('frame-1').innerHTML = 'Slot Foto 1';
            document.getElementById('frame-2').innerHTML = 'Slot Foto 2';
            document.getElementById('frame-3').innerHTML = 'Slot Foto 3';
            captureBtn.style.opacity = '1';
            captureBtn.disabled = false;
            undoBtn.style.display = 'none';
            statusText.innerText = "Siap berpose kembali? (Butuh 3 Foto)";
        }

        function simpanKeGaleri() {
            if (fotoCount < 3) {
                alert("Jepret 3 foto dulu ya sebelum mendownload! 😉");
                return;
            }

            const outputCanvas = document.createElement('canvas');
            outputCanvas.width = 600;
            outputCanvas.height = 1430; 
            const ctx = outputCanvas.getContext('2d');

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);

            const slotWidth = 520;  
            const slotHeight = 390; 
            const marginX = 40;     
            const yPositions = [50, 470, 890]; 

            for (let i = 0; i < 3; i++) {
                const fotoMentah = sisaFoto[i];
                
                const srcWidth = fotoMentah.width;
                const srcHeight = fotoMentah.height;
                
                let cropWidth, cropHeight, cropX, cropY;
                const targetRatio = slotWidth / slotHeight;
                const srcRatio = srcWidth / srcHeight;

                if (srcRatio > targetRatio) {
                    cropHeight = srcHeight;
                    cropWidth = srcHeight * targetRatio;
                    cropX = (srcWidth - cropWidth) / 2;
                    cropY = 0;
                } else {
                    cropWidth = srcWidth;
                    cropHeight = srcWidth / targetRatio;
                    cropX = 0;
                    cropY = (srcHeight - cropHeight) / 2;
                }

                ctx.drawImage(fotoMentah, cropX, cropY, cropWidth, cropHeight, marginX, yPositions[i], slotWidth, slotHeight);
            }

            ctx.strokeStyle = "#e8e2d5";
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.moveTo(marginX, 1315);
            ctx.lineTo(outputCanvas.width - marginX, 1315);
            ctx.stroke();

            ctx.setLineDash([]); 
            ctx.textAlign = "center";
            
            ctx.fillStyle = "#5c4d4d";
            ctx.font = "italic 38px 'Playfair Display', Georgia, serif";
            ctx.fillText("angga & tsania", outputCanvas.width / 2, 1370);

            ctx.fillStyle = "#a6828e";
            ctx.font = "600 18px 'Plus Jakarta Sans', sans-serif";
            ctx.fillText("19 . 07 . 2024", outputCanvas.width / 2, 1405);

            const link = document.createElement('a');
            link.download = 'Angga-Tsania-Photobooth.png';
            link.href = outputCanvas.toDataURL('image/png');
            link.click();
        }

        const lagu = document.getElementById('lagu-romantis');

        window.addEventListener('load', () => {
            if (localStorage.getItem('putarMusik') === 'true') {
                lagu.currentTime = parseFloat(localStorage.getItem('waktuMusik') || 0);
                lagu.play().catch(err => console.log(err));
            }
        });

        setInterval(() => {
            localStorage.setItem('waktuMusik', lagu.currentTime);
        }, 500);

        function kembali() {
            window.location.href = 'galeri.html';
        }
    </script>
</body>
</html>
